#
name: build-push-container

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    branches: ['main']
    paths:
      - '.github/workflows/build-push-container.yml'
      - 'squidpy/**'
      - 'rctd/**'
      - 'scverse/**'
  workflow_dispatch:

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed containers
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            squidpy:
              - 'squidpy/**'
            rctd:
              - 'rctd/**'
            scverse:
              - 'scverse/**'

      - name: Build matrix from changed containers
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SQUIDPY_CHANGED: ${{ steps.changes.outputs.squidpy }}
          RCTD_CHANGED: ${{ steps.changes.outputs.rctd }}
          SCVERSE_CHANGED: ${{ steps.changes.outputs.scverse }}
        run: |
          set -euo pipefail

          changed_images=()
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            changed_images=("squidpy" "rctd" "scverse")
          else
            [ "$SQUIDPY_CHANGED" = "true" ] && changed_images+=("squidpy")
            [ "$RCTD_CHANGED" = "true" ] && changed_images+=("rctd")
            [ "$SCVERSE_CHANGED" = "true" ] && changed_images+=("scverse")
          fi

          if [ "${#changed_images[@]}" -eq 0 ]; then
            echo 'matrix={"image_name":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            matrix_json=$(printf '%s\n' "${changed_images[@]}" | jq -R . | jq -cs '{image_name: .}')
            echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  build-and-push-image:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      # 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ matrix.image_name }}
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see "[Usage](https://github.com/docker/build-push-action#usage)" in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: "./${{ matrix.image_name }}"
          file: "./${{ matrix.image_name }}/Dockerfile"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
